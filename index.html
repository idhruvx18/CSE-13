<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuickCart</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <!-- Logo / Brand -->
    <div class="nav-logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Quick<span class="logo-accent">Cart</span></span>
    </div>

    <!-- Search Bar -->
    <div class="nav-search">
      <span class="search-icon">🔍</span>
      <!-- Event: 'input' triggers real-time product filtering -->
      <input
        type="text"
        id="searchInput"
        placeholder="Search products…"
        autocomplete="off"
      />
    </div>

    <!-- Cart Toggle Button with Badge Counter -->
    <button class="cart-toggle-btn" id="cartToggleBtn" aria-label="Open cart">
      <span class="cart-icon">🛒</span>
      <!-- DOM: cartCount span is updated dynamically -->
      <span class="cart-count" id="cartCount">0</span>
    </button>
  </nav>

  <!-- ===== MAIN LAYOUT ===== -->
  <div class="layout">

    <!-- ===== PRODUCT SECTION ===== -->
    <main class="products-section">
      <div class="section-header">
        <h2 class="section-title">All Products</h2>
        <!-- DOM: resultInfo is updated when searching -->
        <p class="result-info" id="resultInfo"></p>
      </div>
      <!-- DOM: productGrid is populated by renderProducts() in script.js -->
      <div class="product-grid" id="productGrid"></div>
    </main>

    <!-- ===== CART SIDEBAR ===== -->
    <aside class="cart-sidebar" id="cartSidebar">
      <div class="cart-header">
        <h2 class="cart-title">Your Cart</h2>
        <button class="cart-close-btn" id="cartCloseBtn" aria-label="Close cart">✕</button>
      </div>

      <!-- DOM: cartItems div is populated by renderCart() -->
      <div class="cart-items" id="cartItems">
        <div class="cart-empty" id="cartEmpty">
          <span class="empty-icon">🛍️</span>
          <p>Your cart is empty.</p>
          <small>Add some products to get started!</small>
        </div>
      </div>

      <!-- Cart Footer: totals + checkout -->
      <div class="cart-footer" id="cartFooter">
        <div class="cart-total-row">
          <span>Subtotal</span>
          <!-- DOM: cartTotal is updated on every cart change -->
          <span id="cartTotal">₹0</span>
        </div>
        <button class="checkout-btn">Proceed to Checkout</button>
      </div>
    </aside>

  </div><!-- /layout -->

  <!-- Cart overlay (mobile) -->
  <div class="cart-overlay" id="cartOverlay"></div>

  <script src="script.js"></script>
</body>
</html>
